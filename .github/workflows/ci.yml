name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run code quality checks
        run: make check

  detect-migration-changes:
    name: Detect Migration Changes
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.detect.outputs.migrations }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration changes
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "migrations=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" ]] && git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^supabase/migrations/'; then
            echo "migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "migrations=false" >> "$GITHUB_OUTPUT"
          fi

  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    needs:
      - code-quality
      - detect-migration-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-migration-changes.outputs.migrations == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
