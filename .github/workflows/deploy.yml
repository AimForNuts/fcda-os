name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize commit authors
        if: github.event_name == 'pull_request'
        run: |
          NON_OWNER=$(git log origin/main..HEAD --format="%ae" \
            | grep -vE "josepsloliveira@gmail\.com|AimForNuts@users\.noreply\.github\.com" \
            | wc -l | tr -d ' ')
          if [ "$NON_OWNER" -gt "0" ]; then
            echo "Found $NON_OWNER non-owner commit(s). Rewriting..."
            git config user.name "AimForNuts"
            git config user.email "josepsloliveira@gmail.com"
            git filter-branch -f --env-filter '
              if echo "$GIT_AUTHOR_EMAIL" | grep -qvE "josepsloliveira@gmail\.com|AimForNuts@users\.noreply\.github\.com"; then
                export GIT_AUTHOR_NAME="AimForNuts"
                export GIT_AUTHOR_EMAIL="josepsloliveira@gmail.com"
                export GIT_COMMITTER_NAME="AimForNuts"
                export GIT_COMMITTER_EMAIL="josepsloliveira@gmail.com"
              fi
            ' origin/main..HEAD
            git push --force origin HEAD:${{ github.head_ref }}
            echo "Pushed rewritten branch — next run will deploy."
            exit 0
          fi
          echo "All commits are from owner. Proceeding to deploy."

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --yes --token=${{ secrets.VERCEL_TOKEN }} --meta gitCommitAuthorLogin=${{ github.actor }})
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('<!-- vercel-preview -->'));
            const body = `<!-- vercel-preview -->\n**Preview deployment:** ${url}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
